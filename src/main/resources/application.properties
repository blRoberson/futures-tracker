# Application properties for the Futures Tracker application
spring.application.name=futurestracker
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/futures
spring.datasource.username=futuresuser
spring.datasource.password=futurespass

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway configuration
spring.flyway.enabled=true

# Exclude Spring Security auto-configuration to avoid security issues during development
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration